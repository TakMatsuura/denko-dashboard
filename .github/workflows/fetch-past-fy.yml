name: Fetch Past FY Data

# 過去会計年度のデータをFLAMから一度取得して main にコミット
# 手動 trigger 専用 (workflow_dispatch)
# 入力: target_fy (例: 2024 → FY2024 = 2024/05/01〜2025/04/30)

on:
  workflow_dispatch:
    inputs:
      target_fy:
        description: '取得対象FY (例: 2024, 2025)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fetch-past-fy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate input
        run: |
          if ! echo "${{ inputs.target_fy }}" | grep -qE '^[0-9]{4}$'; then
            echo "❌ target_fy は4桁の年 (例: 2024) で指定してください"
            exit 1
          fi
          # 現FY の場合は通常の Update DENKO Dashboard を使うように促す
          CURRENT_FY=$(date -u +%Y)
          CURRENT_MONTH=$(date -u +%m)
          if [ "$CURRENT_MONTH" -lt "05" ]; then
            CURRENT_FY=$((CURRENT_FY - 1))
          fi
          if [ "${{ inputs.target_fy }}" = "$CURRENT_FY" ]; then
            echo "⚠️ 現FY ($CURRENT_FY) は通常の 'Update DENKO Dashboard' workflow を使ってください"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Download FY${{ inputs.target_fy }} from FLAM
        env:
          FLAM_ID: ${{ secrets.FLAM_ID }}
          FLAM_PW: ${{ secrets.FLAM_PW }}
        run: node download_flam.js --fy ${{ inputs.target_fy }}

      - name: Copy CSVs to public/data/fy/${{ inputs.target_fy }}/
        run: |
          mkdir -p public/data/fy/${{ inputs.target_fy }}
          cp /tmp/flam_data_fy${{ inputs.target_fy }}/*.csv public/data/fy/${{ inputs.target_fy }}/ || true
          ls -la public/data/fy/${{ inputs.target_fy }}/
          echo "📊 取得ファイル数:"
          ls public/data/fy/${{ inputs.target_fy }}/ | wc -l

      - name: Commit past FY data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/fy/${{ inputs.target_fy }}/ || true
          git diff --staged --quiet || git commit -m "data: FY${{ inputs.target_fy }} データ取得 (過去FY)"
          git pull --rebase origin main || true
          git push origin main || echo "no changes to push"
