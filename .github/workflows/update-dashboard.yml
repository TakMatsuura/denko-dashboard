name: Update DENKO Dashboard

on:
  schedule:
    - cron: '0 23 * * *'  # 8:00 JST daily (23:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Download from FLAM
        env:
          FLAM_ID: ${{ secrets.FLAM_ID }}
          FLAM_PW: ${{ secrets.FLAM_PW }}
        run: node download_flam.js

      - name: Build Master Summary (Phase 0.3-5)
        run: node build_master_summary.js
        continue-on-error: true

      - name: Build HTML
        run: node build_html.js

      - name: Commit Master History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master_history/ data/master_summary.json || true
          git diff --staged --quiet || git commit -m "chore: update master history $(date -u +%Y-%m-%d)"
          git push origin main || echo "no changes to push"
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
