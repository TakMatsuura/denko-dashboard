name: Update DENKO Dashboard

on:
  schedule:
    - cron: '0 23 * * *'  # 8:00 JST daily (23:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Download from FLAM
        env:
          FLAM_ID: ${{ secrets.FLAM_ID }}
          FLAM_PW: ${{ secrets.FLAM_PW }}
        run: node download_flam.js

      - name: Build HTML
        run: node build_html.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
